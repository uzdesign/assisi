<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assisi — Galleria</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #111; color: #eee; min-height: 100vh; }
  header { padding: 2rem 1.5rem 1rem; text-align: center; border-bottom: 1px solid #222; }
  header h1 { font-weight: 300; letter-spacing: 0.1em; font-size: 1.8rem; }
  header p { color: #888; margin-top: 0.5rem; font-size: 0.9rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 4px; padding: 4px; }
  .tile { position: relative; aspect-ratio: 1; overflow: hidden; cursor: pointer; background: #1a1a1a; }
  .tile img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s, opacity 0.3s; opacity: 0; }
  .tile img.loaded { opacity: 1; }
  .tile:hover img { transform: scale(1.05); }

  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 95vw; max-height: 88vh; object-fit: contain; touch-action: pan-y; user-select: none; -webkit-user-drag: none; }
  .lb-spinner { position: absolute; top: 50%; left: 50%; width: 48px; height: 48px; margin: -24px 0 0 -24px; border: 3px solid rgba(255,255,255,0.15); border-top-color: rgba(255,255,255,0.8); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; pointer-events: none; }
  .lb-spinner.show { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .lb-controls { position: absolute; top: 1rem; right: 1rem; display: flex; gap: 0.5rem; }
  .lb-btn { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 0.6rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; }
  .lb-btn:hover { background: rgba(255,255,255,0.2); }
  .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: #fff; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; }
  .lb-nav:hover { background: rgba(255,255,255,0.15); }
  .lb-prev { left: 1rem; }
  .lb-next { right: 1rem; }
  .lb-caption { position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%); color: #aaa; font-size: 0.85rem; font-variant-numeric: tabular-nums; }
  footer { text-align: center; padding: 2rem 1rem; color: #555; font-size: 0.85rem; }

  .gate { position: fixed; inset: 0; background: #111; display: flex; align-items: center; justify-content: center; z-index: 2000; }
  .gate-box { background: #1a1a1a; padding: 2.5rem 2rem; border-radius: 10px; border: 1px solid #222; max-width: 360px; width: 90%; text-align: center; }
  .gate-box h2 { font-weight: 300; letter-spacing: 0.1em; margin-bottom: 0.3rem; }
  .gate-box p { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
  .gate-box input { width: 100%; padding: 0.7rem 1rem; border-radius: 6px; border: 1px solid #333; background: #0f0f0f; color: #eee; font-size: 1rem; margin-bottom: 0.7rem; }
  .gate-box input:focus { outline: none; border-color: #555; }
  .gate-box button { width: 100%; padding: 0.7rem; border-radius: 6px; border: none; background: #4a90e2; color: #fff; font-size: 0.95rem; cursor: pointer; }
  .gate-box button:hover { background: #5aa0f2; }
  .gate-error { color: #e25555; font-size: 0.8rem; margin-top: 0.5rem; min-height: 1em; }
  .protected { display: none; }
  .protected.unlocked { display: block; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    .lb-btn { padding: 0.5rem 0.7rem; font-size: 0.8rem; }
    .lb-nav { width: 40px; height: 40px; }
  }
</style>

const PWD_HASH = "5ffb29e5ac072ccddda25343a9658f4f0dc1843ffad3bc4e192f8537d56c70fd";

async function sha256(s) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function unlock() {
  document.getElementById("gate").style.display = "none";
  document.getElementById("content").classList.add("unlocked");
  initGallery();
}

document.getElementById("gateForm").addEventListener("submit", async e => {
  e.preventDefault();
  const pwd = document.getElementById("gatePwd").value;
  const hash = await sha256(pwd);
  if (hash === PWD_HASH) {
    sessionStorage.setItem("assisi_unlocked", "1");
    unlock();
  } else {
    document.getElementById("gateError").textContent = "Password errata";
    document.getElementById("gatePwd").select();
  }
});

if (sessionStorage.getItem("assisi_unlocked") === "1") {
  unlock();
}

const url = (id, transform) =>
  `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${transform}/${path(id)}.jpg`;

const thumb = id => url(id, "w_400,h_400,c_fill,q_auto,f_auto");
const preview = id => url(id, "w_1600,q_auto,f_auto");
const download = id => `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/fl_attachment/${path(id)}.jpg`;

const grid = document.getElementById("grid");
const lightbox = document.getElementById("lightbox");
const lbImage = document.getElementById("lbImage");
const lbCaption = document.getElementById("lbCaption");
const lbSpinner = document.getElementById("lbSpinner");
const downloadBtn = document.getElementById("downloadBtn");

lbImage.addEventListener("load", () => lbSpinner.classList.remove("show"));
lbImage.addEventListener("error", () => lbSpinner.classList.remove("show"));

let currentIndex = 0;

photos.forEach((id, idx) => {
  const tile = document.createElement("div");
  tile.className = "tile";
  const img = document.createElement("img");
  img.loading = "lazy";
  img.src = thumb(id);
  img.alt = id;
  img.onload = () => img.classList.add("loaded");
  tile.appendChild(img);
  tile.addEventListener("click", () => openLightbox(idx));
  grid.appendChild(tile);
});

function openLightbox(idx) {
  currentIndex = idx;
  updateLightbox();
  lightbox.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeLightbox() {
  lightbox.classList.remove("open");
  document.body.style.overflow = "";
}

function updateLightbox() {
  const id = photos[currentIndex];
  const src = preview(id);
  if (lbImage.src !== src) {
    lbSpinner.classList.add("show");
    lbImage.removeAttribute("src");
    lbImage.src = src;
    if (lbImage.complete && lbImage.naturalWidth > 0) lbSpinner.classList.remove("show");
  }
  lbImage.alt = id;
  downloadBtn.href = download(id);
  downloadBtn.setAttribute("download", id + ".jpg");
  lbCaption.textContent = `${currentIndex + 1} / ${photos.length} · ${id}`;
}

function next() { currentIndex = (currentIndex + 1) % photos.length; updateLightbox(); }
function prev() { currentIndex = (currentIndex - 1 + photos.length) % photos.length; updateLightbox(); }

document.getElementById("nextBtn").addEventListener("click", next);
document.getElementById("prevBtn").addEventListener("click", prev);
document.getElementById("closeBtn").addEventListener("click", closeLightbox);
lightbox.addEventListener("click", e => { if (e.target === lightbox) closeLightbox(); });

document.addEventListener("keydown", e => {
  if (!lightbox.classList.contains("open")) return;
  if (e.key === "Escape") closeLightbox();
  else if (e.key === "ArrowRight") next();
  else if (e.key === "ArrowLeft") prev();
});

let touchStartX = 0, touchStartY = 0, dragging = false, lockedAxis = null;
const SWIPE_THRESHOLD = 60;

lbImage.addEventListener("touchstart", e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  dragging = true; lockedAxis = null;
}, { passive: true });

lbImage.addEventListener("touchmove", e => {
  if (!dragging) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (!lockedAxis && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
    lockedAxis = Math.abs(dx) > Math.abs(dy) ? "x" : "y";
  }
  if (lockedAxis === "x") e.preventDefault();
}, { passive: false });

lbImage.addEventListener("touchend", e => {
  if (!dragging) return;
  dragging = false;
  if (lockedAxis !== "x") return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > SWIPE_THRESHOLD) {
    if (dx < 0) next(); else prev();
  }
});
}
</script>
</body>
</html>
